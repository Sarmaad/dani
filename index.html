  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

olor:var(--ink-2);font-weight:500;\n    padding:6px 0;\n  }\n  .navlinks a:hover{color:var(--teal)}\n  .navlinks a.active{\n    color:var(--teal);font-weight:600;\n    border-bottom:2px solid var(--teal);\n  }\n  .navlinks .has-caret::after{\n    content:\" ▾\";color:var(--teal);font-size:10px;margin-left:4px;\n  }\n  @media (max-width: 980px){\n    .navlinks{gap:22px}\n    .navlinks a{font-size:13px}\n  }\n\n  /* ---------- Section spacing ---------- */\n  section{padding:88px 0}\n  section.tight{padding:56px 0}\n  .eyebrow{\n    display:inline-flex;align-items:center;gap:14px;\n    font-size:12px;font-weight:700;letter-spacing:.2em;\n    color:var(--teal);text-transform:uppercase;\n    margin-bottom:24px;\n  }\n  .eyebrow::before{\n    content:\"\";display:inline-block;width:42px;height:2px;background:var(--teal);\n  }\n\n  h1.title{\n    font-size:64px;line-height:1.05;letter-spacing:-.02em;\n    font-weight:800;margin:0 0 28px;color:var(--ink);\n    text-wrap:balance;\n  }\n  h1.title .accent{color:var(--teal)}\n  h2.section-title{\n    font-size:42px;line-height:1.1;letter-spacing:-.015em;\n    font-weight:800;margin:0 0 24px;color:var(--ink);\n    text-wrap:balance;\n  }\n  h2.section-title .accent{color:var(--teal)}\n  h3{font-size:20px;font-weight:700;letter-spacing:-.005em;margin:0 0 10px;color:var(--ink)}\n  p{margin:0 0 16px;color:var(--ink-2);font-size:16px;line-height:1.65}\n  p.lede{font-size:19px;line-height:1.6;color:var(--ink-2);max-width:64ch}\n  .subtitle{\n    border-left:3px solid var(--teal);\n    padding:6px 0 6px 18px;\n    margin:0 0 12px;\n    font-style:italic;color:var(--ink-2);\n    font-size:18px;line-height:1.5;\n    max-width:60ch;\n  }\n  .subtitle small{display:block;font-style:normal;color:var(--muted);font-size:14px;margin-top:4px}\n\n  /* ---------- Hero ---------- */\n  .hero{padding:64px 0 24px}\n  .hero-grid{\n    display:grid;grid-template-columns: 1.05fr .95fr;gap:80px;align-items:start;\n  }\n  @media (max-width: 1000px){ .hero-grid{grid-template-columns:1fr;gap:48px} }\n\n  /* metric strip */\n  .metrics{\n    margin-top:48px;\n    display:grid;grid-template-columns:repeat(4, 1fr);\n    border-top:1px solid var(--rule);\n    border-bottom:1px solid var(--rule);\n  }\n  .metric{\n    padding:28px 32px;\n    border-right:1px solid var(--rule);\n  }\n  .metric:last-child{border-right:0}\n  .metric .v{\n    font-size:22px;font-weight:800;color:var(--ink);letter-spacing:-.01em;\n    line-height:1.15;\n  }\n  .metric .v.teal{color:var(--teal)}\n  .metric .l{\n    font-size:11px;font-weight:700;letter-spacing:.18em;\n    color:var(--muted);text-transform:uppercase;margin-top:8px;\n  }\n  @media (max-width: 820px){\n    .metrics{grid-template-columns:repeat(2,1fr)}\n    .metric{border-bottom:1px solid var(--rule);padding:24px 28px}\n    .metric:nth-child(2n){border-right:0}\n    .metric:nth-last-child(-n+2){border-bottom:0}\n  }\n\n  /* ---------- Process flow infographic ---------- */\n  .flow{\n    background:var(--bg-card);\n    border-radius:18px;\n    padding:30px 28px;\n    position:relative;\n  }\n  .flow-title{\n    font-size:11px;font-weight:700;letter-spacing:.22em;\n    color:var(--teal);text-transform:uppercase;\n    display:flex;align-items:center;gap:14px;margin-bottom:18px;\n  }\n  .flow-title::before, .flow-title::after{\n    content:\"\";flex:1;height:1px;background:var(--rule);\n  }\n  .flow-step{\n    background:#fff;\n    border:1px solid var(--rule);\n    border-radius:12px;\n    padding:14px 16px;\n    display:grid;\n    grid-template-columns:32px 1fr;\n    gap:14px;align-items:start;\n    position:relative;\n  }\n  .flow-step + .flow-step{margin-top:0}\n  .flow-step .n{\n    font-family:\"JetBrains Mono\", ui-monospace, monospace;\n    font-size:12px;color:var(--teal);font-weight:600;\n    background:var(--teal-pale);\n    border-radius:6px;\n    width:32px;height:32px;display:grid;place-items:center;\n  }\n  .flow-step .name{\n    font-weight:700;color:var(--ink);font-size:14px;margin-bottom:4px;\n  }\n  .flow-step .sub{\n    font-size:12.5px;color:var(--muted);line-height:1.5;\n  }\n  .flow-step .sub span{display:inline-block;margin-right:10px}\n  .flow-step .sub span::before{content:\"·  \";color:var(--teal-soft)}\n  .flow-step.highlight{\n    background:var(--teal);border-color:var(--teal);\n  }\n  .flow-step.highlight .n{background:rgba(255,255,255,.16);color:#fff}\n  .flow-step.highlight .name{color:#fff}\n  .flow-step.highlight .sub{color:rgba(255,255,255,.78)}\n  .flow-step.highlight .sub span::before{color:rgba(255,255,255,.55)}\n  .flow-arrow{\n    display:flex;justify-content:center;padding:6px 0;\n    color:var(--teal-soft);font-size:14px;\n  }\n  .flow-arrow svg{display:block}\n\n  /* ---------- Section header ---------- */\n  .section-head{margin-bottom:48px;max-width:760px}\n  .small-label{\n    font-size:11px;letter-spacing:.22em;font-weight:700;color:var(--teal);\n    text-transform:uppercase;display:inline-flex;gap:14px;align-items:center;\n    margin-bottom:14px;\n  }\n  .small-label::before{content:\"\";width:24px;height:2px;background:var(--teal)}\n\n  /* ---------- Two column ---------- */\n  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:64px}\n  @media (max-width: 980px){ .two-col{grid-template-columns:1fr;gap:36px} }\n\n  /* ---------- Challenge / Role cards ---------- */\n  .stack{display:flex;flex-direction:column;gap:12px;margin-top:8px}\n  .checklist{\n    background:var(--bg-card);\n    border-radius:14px;\n    padding:26px 28px;\n  }\n  .checklist h4{\n    margin:0 0 16px;font-size:13px;letter-spacing:.18em;text-transform:uppercase;\n    color:var(--muted);font-weight:700;\n  }\n  .checklist ul{list-style:none;margin:0;padding:0}\n  .checklist li{\n    padding:13px 0 13px 30px;\n    border-top:1px solid var(--rule);\n    position:relative;font-size:15px;color:var(--ink);line-height:1.5;\n  }\n  .checklist li:first-child{border-top:0}\n  .checklist li::before{\n    content:\"\";position:absolute;left:0;top:18px;\n    width:14px;height:14px;border-radius:4px;\n    background:var(--teal-pale);\n    box-shadow: inset 0 0 0 1.5px var(--teal);\n  }\n  .checklist li::after{\n    content:\"\";position:absolute;left:3.5px;top:21.5px;\n    width:7px;height:4px;border-left:2px solid var(--teal);\n    border-bottom:2px solid var(--teal);transform:rotate(-45deg);\n  }\n\n  /* ---------- Hub: browser frame around real screenshot ---------- */\n  .hub{\n    background:var(--bg-card);\n    border-radius:20px;\n    padding:24px;\n  }\n  .browser{\n    background:#fff;border-radius:14px;overflow:hidden;\n    box-shadow:0 1px 0 var(--rule), 0 24px 60px -32px rgba(20,20,20,.18);\n  }\n  .browser-bar{\n    display:flex;align-items:center;gap:8px;\n    padding:12px 16px;border-bottom:1px solid var(--rule);background:#fbfaf6;\n  }\n  .browser-bar .dot{width:10px;height:10px;border-radius:50%;background:#d9d6cd}\n  .browser-bar .dot:nth-child(1){background:#e8b4ad}\n  .browser-bar .dot:nth-child(2){background:#e7d4a2}\n  .browser-bar .dot:nth-child(3){background:#9ec6bd}\n  .browser-bar .url{\n    flex:1;margin-left:14px;background:var(--bg);\n    border-radius:6px;padding:6px 12px;\n    font-family:\"JetBrains Mono\",monospace;font-size:11px;color:var(--muted);\n    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\n  }\n  .browser-screenshot{display:block;background:#fff}\n  .browser-screenshot img{display:block;width:100%;height:auto}\n\n  /* ---------- Numbered insight cards (right column reuse) ---------- */\n  .insights{display:flex;flex-direction:column;gap:18px}\n  .insight{\n    background:var(--bg-card);\n    border-radius:14px;padding:28px 30px;\n  }\n  .insight .n{\n    font-size:36px;font-weight:800;color:var(--teal-soft);\n    letter-spacing:-.01em;line-height:1;margin-bottom:18px;\n    font-family:\"Manrope\",sans-serif;\n  }\n  .insight h3{margin-bottom:8px}\n  .insight p{margin:0;color:var(--ink-2);font-size:15px;line-height:1.6}\n\n  /* ---------- Sub-section head ---------- */\n  .subhead{\n    display:grid;grid-template-columns: 120px 1fr;gap:32px;align-items:start;\n    margin-bottom:28px;padding-top:16px;\n    border-top:1px solid var(--rule);\n  }\n  .subhead-tag{\n    font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--teal);font-weight:700;\n    padding-top:6px;\n  }\n  .subhead-title{\n    font-size:24px;font-weight:800;color:var(--ink);margin:0 0 6px;letter-spacing:-.01em;\n  }\n  .subhead-d{font-size:15px;color:var(--ink-2);margin:0;max-width:62ch;grid-column:2}\n  @media (max-width:760px){ .subhead{grid-template-columns:1fr;gap:8px} .subhead-tag{padding-top:0} .subhead-d{grid-column:1} }\n\n  /* ---------- Delivery stat cards ---------- */\n  .outcomes{\n    display:grid;grid-template-columns:repeat(4,1fr);gap:18px;\n  }\n  @media (max-width: 980px){ .outcomes{grid-template-columns:repeat(2,1fr)} }\n  @media (max-width: 560px){ .outcomes{grid-template-columns:1fr} }\n  .stat{\n    background:#fff;border-radius:14px;padding:36px 32px;\n    border:1px solid var(--rule);\n    display:flex;flex-direction:column;gap:6px;min-height:180px;\n  }\n  .stat .ico{\n    width:36px;height:36px;display:grid;place-items:center;\n    border-radius:8px;background:var(--teal-pale);color:var(--teal);\n    margin-bottom:12px;\n  }\n  .stat .v{\n    font-size:36px;font-weight:800;color:var(--teal);line-height:1;letter-spacing:-.02em;\n  }\n  .stat.big .v{font-size:48px}\n  .stat .l{\n    font-size:11px;letter-spacing:.18em;font-weight:700;text-transform:uppercase;color:var(--muted);margin-top:4px;\n  }\n  .stat .d{font-size:14px;color:var(--ink-2);line-height:1.5;margin-top:10px}\n\n  /* ---------- Impact cards ---------- */\n  .impact-grid{\n    display:grid;grid-template-columns:repeat(3,1fr);gap:18px;\n  }\n  @media (max-width:980px){ .impact-grid{grid-template-columns:1fr} }\n  .impact-card{\n    background:var(--teal);color:#fff;border-radius:14px;padding:32px 28px;\n    display:flex;flex-direction:column;\n    position:relative;overflow:hidden;\n  }\n  .impact-card:nth-child(2){background:#0a5a4d}\n  .impact-card:nth-child(3){background:#084438}\n  .impact-card::after{\n    content:\"\";position:absolute;right:-30px;top:-30px;width:130px;height:130px;\n    border:1px solid rgba(255,255,255,.14);border-radius:50%;\n  }\n  .impact-num{\n    font-size:64px;font-weight:800;letter-spacing:-.03em;line-height:1;color:#fff;\n    margin-bottom:14px;\n  }\n  .impact-num span{font-size:24px;font-weight:700;opacity:.7;margin-left:2px;letter-spacing:0}\n  .impact-l{\n    font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;\n    color:rgba(255,255,255,.85);margin-bottom:12px;\n  }\n  .impact-d{font-size:14.5px;color:rgba(255,255,255,.82);line-height:1.55;margin:0}\n\n  /* ---------- Skills chip list ---------- */\n  .takeaway{\n    background:#fff;border:1px solid var(--rule);border-radius:18px;\n    padding:36px 40px;\n  }\n  .chip-grid{\n    display:grid;grid-template-columns:repeat(2,1fr);gap:0;\n  }\n  @media (max-width: 760px){ .chip-grid{grid-template-columns:1fr} }\n  .chip-item{\n    display:flex;align-items:flex-start;gap:14px;\n    padding:18px 0;border-top:1px solid var(--rule);\n  }\n  .chip-item:nth-child(-n+2){border-top:0}\n  @media (max-width: 760px){\n    .chip-item:nth-child(2){border-top:1px solid var(--rule)}\n  }\n  .chip-item .b{\n    color:var(--teal);font-family:\"JetBrains Mono\",monospace;font-size:12px;font-weight:600;\n    flex-shrink:0;padding-top:2px;\n  }\n  .chip-item .t{font-weight:600;font-size:15px;color:var(--ink);line-height:1.45}\n\n  /* ---------- Dark banner ---------- */\n  .banner{\n    background:var(--teal-bg);\n    color:#fff;border-radius:18px;\n    padding:54px 56px;\n    display:grid;grid-template-columns: 1fr 1.7fr;gap:48px;\n    margin:24px 0 80px;\n  }\n  @media (max-width: 980px){ .banner{grid-template-columns:1fr;padding:36px} }\n  .banner h2{\n    font-size:38px;line-height:1.1;font-weight:800;margin:0;letter-spacing:-.015em;\n    color:#fff;text-wrap:balance;\n  }\n  .banner-cols{\n    display:grid;grid-template-columns:repeat(3,1fr);gap:36px;\n    border-left:1px solid rgba(255,255,255,.18);padding-left:48px;\n  }\n  @media (max-width: 980px){ .banner-cols{border-left:0;padding-left:0;grid-template-columns:1fr 1fr} }\n  @media (max-width: 560px){ .banner-cols{grid-template-columns:1fr} }\n  .banner-col .ico{\n    width:30px;height:30px;display:grid;place-items:center;margin-bottom:14px;color:#fff;opacity:.9;\n  }\n  .banner-col h4{font-size:18px;font-weight:700;margin:0 0 10px;color:#fff}\n  .banner-col p{color:rgba(255,255,255,.78);font-size:14px;margin:0;line-height:1.55}\n\n  /* ---------- Button ---------- */\n  .btn{\n    display:inline-flex;align-items:center;gap:10px;\n    background:var(--teal);color:#fff;font-weight:600;\n    padding:13px 22px;border-radius:6px;font-size:14px;\n    border:0;cursor:pointer;\n    transition:background .15s ease;\n  }\n  .btn:hover{background:var(--teal-deep)}\n  .btn .arrow{transition:transform .2s ease}\n  .btn:hover .arrow{transform:translateX(2px)}\n\n  /* ---------- Footer ---------- */\n  footer.site{\n    padding:30px 0 50px;border-top:1px solid var(--rule);\n  }\n  footer.site .row{\n    display:flex;justify-content:space-between;align-items:center;\n    font-size:11px;letter-spacing:.18em;text-transform:uppercase;\n    color:var(--muted);font-weight:600;\n  }\n\n  /* ---------- FAQ interactive accordion ---------- */\n  .faq{\n    background:var(--bg-card);border-radius:14px;\n    padding:8px 28px;\n  }\n  .faq details{\n    border-top:1px solid var(--rule);\n  }\n  .faq details:first-child{border-top:0}\n  .faq summary{\n    list-style:none;cursor:pointer;\n    padding:22px 0;display:flex;justify-content:space-between;align-items:center;\n    font-weight:600;font-size:16px;color:var(--ink);\n  }\n  .faq summary::-webkit-details-marker{display:none}\n  .faq summary .ico{\n    width:24px;height:24px;border-radius:50%;background:var(--teal-pale);color:var(--teal);\n    display:grid;place-items:center;font-weight:700;font-size:13px;\n    transition:transform .25s ease;\n  }\n  .faq details[open] summary .ico{transform:rotate(45deg);background:var(--teal);color:#fff}\n  .faq .body{\n    padding:0 0 22px;color:var(--ink-2);font-size:15px;line-height:1.6;\n    max-width:62ch;\n  }\n</style>\n\n</head>\n<body>\n\n<!-- ======================== Header ======================== -->\n<header class=\"site\">\n  <div class=\"wrap\">\n    <nav class=\"nav\" aria-label=\"Primary\">\n      <a class=\"logo\" href=\"https://www.figma.com/proto/kywICINOirLB7ZghOcSq3X/Danielle-Kartika?node-id=2-1261&p=f&t=TTLrOcWqKVPq5CG3-0&scaling=scale-down-width&content-scaling=fixed&page-id=0%3A1&starting-point-node-id=2%3A1261&hide-ui=1\">D.KARTIKA</a>\n    </nav>\n  </div>\n</header>\n\n<!-- ======================== Hero ======================== -->\n<section class=\"hero\" data-screen-label=\"01 Hero\">\n  <div class=\"wrap\">\n\n    <div class=\"hero-grid\">\n      <div>\n        <div class=\"eyebrow\">Case Study 03</div>\n        <h1 class=\"title\">NGS Super Member Portal <span class=\"accent\">Transformation</span></h1>\n        <p class=\"subtitle\">\n          Delivering a large-scale digital content transformation during the transition of member administration and portal services in-house from Mercer.\n          <small>Coordinated communication across web, email, portal and support, with a compressed delivery timeframe.</small>\n        </p>\n      </div>\n\n      <!-- Process flow infographic -->\n      <div class=\"flow\" aria-label=\"Transformation flow\">\n        <div class=\"flow-title\">Transformation Flow</div>\n\n        <div class=\"flow-step\">\n          <div class=\"n\">01</div>\n          <div>\n            <div class=\"name\">Mercer Administration</div>\n            <div class=\"sub\"><span>Existing provider</span><span>Legacy processes</span></div>\n          </div>\n        </div>\n        <div class=\"flow-arrow\" aria-hidden=\"true\">\n          <svg width=\"16\" height=\"22\" viewBox=\"0 0 16 22\" fill=\"none\"><path d=\"M8 1v18m0 0l6-6m-6 6l-6-6\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path></svg>\n        </div>\n\n        <div class=\"flow-step\">\n          <div class=\"n\">02</div>\n          <div>\n            <div class=\"name\">NGS Bringing Services In-House</div>\n            <div class=\"sub\"><span>Operational transition</span><span>Service transformation</span></div>\n          </div>\n        </div>\n        <div class=\"flow-arrow\" aria-hidden=\"true\">\n          <svg width=\"16\" height=\"22\" viewBox=\"0 0 16 22\" fill=\"none\"><path d=\"M8 1v18m0 0l6-6m-6 6l-6-6\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path></svg>\n        </div>\n\n        <div class=\"flow-step\">\n          <div class=\"n\">03</div>\n          <div>\n            <div class=\"name\">Member Portal Transition</div>\n            <div class=\"sub\"><span>New member experience</span><span>Updated digital journeys</span></div>\n          </div>\n        </div>\n        <div class=\"flow-arrow\" aria-hidden=\"true\">\n          <svg width=\"16\" height=\"22\" viewBox=\"0 0 16 22\" fill=\"none\"><path d=\"M8 1v18m0 0l6-6m-6 6l-6-6\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path></svg>\n        </div>\n\n        <div class=\"flow-step highlight\">\n          <div class=\"n\">04</div>\n          <div>\n            <div class=\"name\">Transformation Communication Hub</div>\n            <div class=\"sub\"><span>FAQs</span><span>Updates</span><span>Guidance</span><span>Support</span></div>\n          </div>\n        </div>\n        <div class=\"flow-arrow\" aria-hidden=\"true\">\n          <svg width=\"16\" height=\"22\" viewBox=\"0 0 16 22\" fill=\"none\"><path d=\"M8 1v18m0 0l6-6m-6 6l-6-6\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path></svg>\n        </div>\n\n        <div class=\"flow-step\">\n          <div class=\"n\">05</div>\n          <div>\n            <div class=\"name\">Member Education &amp; Support</div>\n            <div class=\"sub\"><span>Clear communication</span><span>Reduced uncertainty</span><span>Improved accessibility</span></div>\n          </div>\n        </div>\n      </div>\n    </div>\n\n    <!-- Metrics row -->\n    <div class=\"metrics\">\n      <div class=\"metric\">\n        <div class=\"v teal\">3 Month</div>\n        <div class=\"l\">Delivery window</div>\n      </div>\n      <div class=\"metric\">\n        <div class=\"v\">Multi-channel</div>\n        <div class=\"l\">Digital rollout</div>\n      </div>\n      <div class=\"metric\">\n        <div class=\"v\">Web · Portal · Email · FAQ</div>\n        <div class=\"l\">Channels delivered</div>\n      </div>\n      <div class=\"metric\">\n        <div class=\"v\">Cross-functional</div>\n        <div class=\"l\">Transformation delivery</div>\n      </div>\n    </div>\n\n  </div>\n</section>\n\n<!-- ======================== The Challenge ======================== -->\n<section data-screen-label=\"02 The Challenge\">\n  <div class=\"wrap\">\n\n    <div class=\"two-col\">\n      <div>\n        <div class=\"small-label\">Section 02</div>\n        <h2 class=\"section-title\">The <span class=\"accent\">Challenge</span></h2>\n        <p class=\"lede\">\n          The transition impacted how members accessed services, information, and digital experiences. The scale and pace of change required a highly structured communication approach to ensure members could navigate the transformation confidently.\n        </p>\n      </div>\n\n      <div class=\"checklist\">\n        <h4>Key challenges</h4>\n        <ul>\n          <li>Delivering high-volume digital updates within a compressed timeframe</li>\n          <li>Maintaining consistency across multiple communication channels</li>\n          <li>Translating complex operational changes into member-friendly communication</li>\n          <li>Coordinating approvals and delivery across multiple business teams</li>\n          <li>Supporting members before, during, and after the transition</li>\n        </ul>\n      </div>\n    </div>\n\n  </div>\n</section>\n\n<!-- ======================== My Role ======================== -->\n<section class=\"tight\" data-screen-label=\"03 My Role\">\n  <div class=\"wrap\">\n\n    <div class=\"two-col\">\n      <div class=\"checklist\" style=\"order:1\">\n        <h4>Responsibilities</h4>\n        <ul>\n          <li>Building and managing a dedicated transformation landing page</li>\n          <li>Developing structured FAQ and support content</li>\n          <li>Coordinating updates across web and member communication channels</li>\n          <li>Working closely with marketing, service, product, compliance and technology stakeholders</li>\n          <li>Maintaining governance, consistency and delivery timelines across a large-scale rollout</li>\n        </ul>\n      </div>\n\n      <div style=\"order:2\">\n        <div class=\"small-label\">Section 03</div>\n        <h2 class=\"section-title\">My <span class=\"accent\">Role</span></h2>\n        <p class=\"lede\">\n          Led the digital content and communication delivery across web, portal, email and supporting educational content during the transformation, bridging operational change and member experience.\n        </p>\n      </div>\n    </div>\n\n  </div>\n</section>\n\n<!-- ======================== Transformation Hub ======================== -->\n<section data-screen-label=\"04 Transformation Hub\">\n  <div class=\"wrap\">\n\n    <div class=\"section-head\">\n      <div class=\"small-label\">Section 04</div>\n      <h2 class=\"section-title\">Transformation <span class=\"accent\">Information Hub</span></h2>\n      <p class=\"lede\">A centralised destination designed to support members before, during, and after the transition, a single source of truth that reduced fragmentation across a complex operational change.</p>\n    </div>\n\n    <div class=\"two-col\" style=\"grid-template-columns: 1.05fr .95fr; gap: 56px;\">\n      <!-- Live NGS Member Online page - real screenshot -->\n      <div class=\"hub\">\n        <div class=\"browser\">\n          <div class=\"browser-bar\">\n            <div class=\"dot\"></div><div class=\"dot\"></div><div class=\"dot\"></div>\n            <div class=\"url\">ngssuper.com.au / ngsmemberonline / memberonline</div>\n          </div>\n          <div class=\"browser-screenshot\">\n            <img src=\"c95dc82e-9a49-4828-a74c-cccd42c8d6d3\" alt=\"NGS Super Member Online upgrade hub: live page showing hero banner, re-register guidance, video tutorials and FAQs.\" loading=\"lazy\">\n          </div>\n        </div>\n      </div>\n\n      <!-- Right column: explanation as numbered insights -->\n      <div class=\"insights\">\n        <div class=\"insight\">\n          <div class=\"n\">01</div>\n          <h3>FAQs &amp; Support Information</h3>\n          <p>Structured the questions members were actually asking, and surfaced answers in plain language, ordered by urgency at each stage of the rollout.</p>\n        </div>\n        <div class=\"insight\">\n          <div class=\"n\">02</div>\n          <h3>Key Updates &amp; Timelines</h3>\n          <p>Maintained a single, dated source of truth for the transition, every channel pointed back here, so messaging stayed consistent across teams.</p>\n        </div>\n        <div class=\"insight\">\n          <div class=\"n\">03</div>\n          <h3>Educational Guidance</h3>\n          <p>Created supporting content that walked members through what was changing, why, and how to navigate the new digital experience confidently.</p>\n        </div>\n        <div class=\"insight\">\n          <div class=\"n\">04</div>\n          <h3>Navigation &amp; Ongoing Support</h3>\n          <p>Built clear pathways from awareness to action (bookings, contact, login), reducing fragmentation across a complex operational change.</p>\n        </div>\n      </div>\n    </div>\n\n    <!-- Interactive FAQ -->\n    <div style=\"margin-top:40px\">\n      <div class=\"small-label\" style=\"margin-bottom:18px\">Member FAQ: sample</div>\n      <div class=\"faq\" aria-label=\"Sample FAQ accordion\">\n        <details open=\"\">\n          <summary>Will my login details still work after the transition? <span class=\"ico\" aria-hidden=\"true\">+</span></summary>\n          <div class=\"body\">Yes. Existing credentials remain valid. After the cut-over you'll be prompted to verify a few details once, after which all features of the new portal are available without further setup.</div>\n        </details>\n        <details>\n          <summary>What happens to my investment information and history? <span class=\"ico\" aria-hidden=\"true\">+</span></summary>\n          <div class=\"body\">All member records, balances and transaction history transfer in full. Past statements remain accessible from the documents section of the new portal.</div>\n        </details>\n        <details>\n          <summary>Is there an outage window I should know about? <span class=\"ico\" aria-hidden=\"true\">+</span></summary>\n          <div class=\"body\">A short read-only period applies during cut-over weekend. Members are notified by email, on the hub, and at portal sign-in two weeks before, again at one week, and on the day.</div>\n        </details>\n        <details>\n          <summary>Who can I contact if something doesn't look right? <span class=\"ico\" aria-hidden=\"true\">+</span></summary>\n          <div class=\"body\">The member services team is available by phone and secure message throughout the transition. Direct contact pathways are surfaced from every hub page.</div>\n        </details>\n      </div>\n    </div>\n\n  </div>\n</section>\n\n<!-- ======================== Outcome & Impact ======================== -->\n<section data-screen-label=\"05 Outcome\">\n  <div class=\"wrap\">\n\n    <div class=\"section-head\">\n      <div class=\"small-label\">Section 05</div>\n      <h2 class=\"section-title\">Outcome &amp; <span class=\"accent\">Impact</span></h2>\n      <p class=\"lede\">A structured, member-first transformation delivered on time, measurable on both the production side and the member experience.</p>\n    </div>\n\n    <!-- Part 1: Delivery -->\n    <div class=\"subhead\">\n      <span class=\"subhead-tag\">Part 01</span>\n      <h3 class=\"subhead-title\">Delivered at scale</h3>\n      <p class=\"subhead-d\">Production volume across content, audit and member communication over the three-month delivery window.</p>\n    </div>\n\n    <div class=\"outcomes\">\n      <div class=\"stat big\">\n        <div class=\"ico\" aria-hidden=\"true\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 6h16M4 12h16M4 18h10\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"></path></svg>\n        </div>\n        <div class=\"v\">350</div>\n        <div class=\"l\">Keywords updated</div>\n        <div class=\"d\">Legacy-administration terms refreshed across the site in three months.</div>\n      </div>\n      <div class=\"stat big\">\n        <div class=\"ico\" aria-hidden=\"true\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 4h9l4 4v12a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"></path><path d=\"M8 11h8M8 15h6\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"></path></svg>\n        </div>\n        <div class=\"v\">75</div>\n        <div class=\"l\">Articles audited</div>\n        <div class=\"d\">Full content audit to align tone, accuracy and member relevance.</div>\n      </div>\n      <div class=\"stat big\">\n        <div class=\"ico\" aria-hidden=\"true\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M3 7l9 6 9-6M3 7v10a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V7M3 7l9-4 9 4\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"></path></svg>\n        </div>\n        <div class=\"v\">20</div>\n        <div class=\"l\">eDMs deployed</div>\n        <div class=\"d\">4 messages × 5 member cohorts, segmented to reach the right audience at the right time.</div>\n      </div>\n      <div class=\"stat big\">\n        <div class=\"ico\" aria-hidden=\"true\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"16\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.6\"></rect><path d=\"M3 9h18M8 3v4M16 3v4\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"></path></svg>\n        </div>\n        <div class=\"v\">Weekly</div>\n        <div class=\"l\">Hub updates</div>\n        <div class=\"d\">Cadence of Transformation Hub updates throughout the rollout.</div>\n      </div>\n    </div>\n\n    <!-- Part 2: Impact -->\n    <div class=\"subhead\" style=\"margin-top:64px\">\n      <span class=\"subhead-tag\">Part 02</span>\n      <h3 class=\"subhead-title\">Measurable impact</h3>\n      <p class=\"subhead-d\">Reduced friction for members and a quieter, better-supported contact centre.</p>\n    </div>\n\n    <div class=\"impact-grid\">\n      <div class=\"impact-card\">\n        <div class=\"impact-num\">50<span>%</span></div>\n        <div class=\"impact-l\">Reduction in complaints</div>\n        <div class=\"impact-d\">Member complaints fell by half during the rollout, driven by clear, proactive communication and a single source of truth on the Transformation Hub.</div>\n      </div>\n      <div class=\"impact-card\">\n        <div class=\"impact-num\">−60<span>%</span></div>\n        <div class=\"impact-l\">Call volume by week 2</div>\n        <div class=\"impact-d\">Call duration and volume dropped 60% by week two, driven by a vanity URL easy to share over the phone and a how-to video gallery on the hub.</div>\n      </div>\n      <div class=\"impact-card\">\n        <div class=\"impact-num\">1<span>&nbsp;source</span></div>\n        <div class=\"impact-l\">Call-centre support</div>\n        <div class=\"impact-d\">FAQs and key dates clearly outlined on the Transformation Hub gave the contact centre a single, authoritative reference to direct members to.</div>\n      </div>\n    </div>\n\n  </div>\n</section>\n\n<!-- ======================== What This Project Demonstrated ======================== -->\n<section class=\"tight\" data-screen-label=\"06 Takeaway\">\n  <div class=\"wrap\">\n\n    <div class=\"section-head\">\n      <div class=\"small-label\">Final takeaway</div>\n      <h2 class=\"section-title\">What This Project <span class=\"accent\">Demonstrated</span></h2>\n    </div>\n\n    <div class=\"takeaway\">\n      <div class=\"chip-grid\">\n        <div class=\"chip-item\"><div class=\"b\">01</div><div class=\"t\">Large-scale digital transformation delivery</div></div>\n        <div class=\"chip-item\"><div class=\"b\">02</div><div class=\"t\">Structured communication systems</div></div>\n        <div class=\"chip-item\"><div class=\"b\">03</div><div class=\"t\">Cross-functional stakeholder management</div></div>\n        <div class=\"chip-item\"><div class=\"b\">04</div><div class=\"t\">Scalable content operations</div></div>\n        <div class=\"chip-item\"><div class=\"b\">05</div><div class=\"t\">Customer-focused digital experiences</div></div>\n        <div class=\"chip-item\"><div class=\"b\">06</div><div class=\"t\">Governance within regulated environments</div></div>\n        <div class=\"chip-item\"><div class=\"b\">07</div><div class=\"t\">Operational coordination under tight timelines</div></div>\n        <div class=\"chip-item\"><div class=\"b\">08</div><div class=\"t\">Translating complexity into member confidence</div></div>\n      </div>\n    </div>\n\n  </div>\n</section>\n\n<!-- ======================== Dark teal banner ======================== -->\n<section style=\"padding:24px 0 0\">\n  <div class=\"wrap\">\n    <div class=\"banner\">\n      <div>\n        <h2>Transformation,<br>delivered as<br>a system.</h2>\n      </div>\n      <div class=\"banner-cols\">\n        <div class=\"banner-col\">\n          <div class=\"ico\" aria-hidden=\"true\">\n            <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 5h16v4H4zM4 11h16v4H4zM4 17h10v3H4z\" stroke=\"currentColor\" stroke-width=\"1.6\"></path></svg>\n          </div>\n          <h4>Multi-channel rollout</h4>\n          <p>Coordinated delivery across web, portal, email and support, one message on every surface.</p>\n        </div>\n        <div class=\"banner-col\">\n          <div class=\"ico\" aria-hidden=\"true\">\n            <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"6\" cy=\"6\" r=\"2\" stroke=\"currentColor\" stroke-width=\"1.6\"></circle><circle cx=\"18\" cy=\"6\" r=\"2\" stroke=\"currentColor\" stroke-width=\"1.6\"></circle><circle cx=\"6\" cy=\"18\" r=\"2\" stroke=\"currentColor\" stroke-width=\"1.6\"></circle><circle cx=\"18\" cy=\"18\" r=\"2\" stroke=\"currentColor\" stroke-width=\"1.6\"></circle><path d=\"M8 6h8M8 18h8M6 8v8M18 8v8\" stroke=\"currentColor\" stroke-width=\"1.6\"></path></svg>\n          </div>\n          <h4>Single source of truth</h4>\n          <p>A central information hub eliminated fragmentation and gave teams one place to point members.</p>\n        </div>\n        <div class=\"banner-col\">\n          <div class=\"ico\" aria-hidden=\"true\">\n            <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M3 12h6l3-7 3 14 3-7h3\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path></svg>\n          </div>\n          <h4>Compressed timeline</h4>\n          <p>Delivered inside a three-month window, with governance and consistency maintained throughout.</p>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- ======================== Footer ======================== -->\n<footer class=\"site\">\n  <div class=\"wrap\">\n    <div class=\"row\">\n      <div>© 2026 Danielle Kartika. Proprietary and Confidential.</div>\n      <div>Case Study 03</div>\n    </div>\n  </div>\n</footer>\n\n\n\n</body></html>"
  </script>
